<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyPick - 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7fa;
            --white: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --accent-color: #6a5acd; /* DailyPick 보라색 포인트 */
            --input-focus: #eeebff;
            --border-color: #e1e4e8;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area h2 {
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: -1px;
            margin: 0;
        }

        .logo-area h2 span {
            color: var(--accent-color);
        }

        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .login-card h3 {
            margin: 0 0 10px 0;
            font-size: 1.25rem;
            text-align: center;
            font-weight: 700;
        }

        .login-card p {
            color: var(--text-sub);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px 12px 42px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: var(--input-focus);
        }

        /* Button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .footer-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="logo-area">
        <h2>DAILY<span>PICK</span></h2>
    </div>

    <div class="login-card">
        <h3>로그인</h3>
        <p>반가워요! 서비스를 시작해볼까요?</p>

        <form id="userForm">
            <div class="form-group">
                <label>아이디</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="userId" class="form-control" placeholder="아이디 입력" required>
                </div>
            </div>

            <div class="form-group">
                <label>비밀번호</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
                </div>
            </div>

            <button type="button" class="btn-login" onclick="sendData()">로그인하기</button>
        </form>
        
        <div class="footer-links">
            아직 계정이 없으신가요? <a href="/user/join">회원가입</a>
        </div>
    </div>
</div>

<script>
    async function sendData() {
        const formData = new FormData(document.getElementById('userForm'));
        const data = new URLSearchParams(formData);

        try {
            const response = await fetch('/api/user/login', {
                method: 'POST',
                body: data
            });

            if (!response.ok) {
                throw new Error('네트워크 응답이 정상적이지 않습니다.');
            }

            const result = await response.json();

            if (result.status === "success") {
                window.location.href = '/'; 
            } else {
                alert("로그인 실패: " + (result.message || "아이디 또는 비밀번호를 확인하세요."));
            }

        } catch (error) {
            console.error("에러 발생:", error);
            alert("로그인 처리 중 오류가 발생했습니다.");
        }
    }

    document.getElementById('userForm').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendData();
        }
    });
</script>

</body>
</html>
