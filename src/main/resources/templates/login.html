<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyPick - 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-wrapper">
    <div class="logo-area">
        <h2>DAILY<span>PICK</span></h2>
    </div>

    <div class="login-card">
        <h3>로그인</h3>
        <p>반가워요! 서비스를 시작해볼까요?</p>

        <form id="userForm">
            <div class="form-group">
                <label>아이디</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="userId" class="form-control" placeholder="아이디 입력" required>
                </div>
            </div>

            <div class="form-group">
                <label>비밀번호</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
                </div>
            </div>

            <button type="button" class="btn-login" onclick="sendData()">로그인하기</button>
        </form>
        
        <div class="footer-links">
            아직 계정이 없으신가요? <a href="/user/join">회원가입</a>
        </div>
    </div>
</div>

<script>
    async function sendData() {
        const formData = new FormData(document.getElementById('userForm'));
        const data = new URLSearchParams(formData);

        try {
            const response = await fetch('/api/user/login', {
                method: 'POST',
                body: data
            });

            if (!response.ok) {
                throw new Error('네트워크 응답이 정상적이지 않습니다.');
            }

            const result = await response.json();

            if (result.status === "success") {
                window.location.href = '/'; 
            } else {
                alert("로그인 실패: " + (result.message || "아이디 또는 비밀번호를 확인하세요."));
            }

        } catch (error) {
            console.error("에러 발생:", error);
            alert("로그인 처리 중 오류가 발생했습니다.");
        }
    }

    document.getElementById('userForm').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendData();
        }
    });
</script>

</body>
</html>
