<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyPick - 메일 이력</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f9f9f9;
            --white: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --border-color: #eeeeee;
            --accent-color: #6a5acd;
            --premium-color: #8e78f0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Header */
        .navbar {
            background: var(--white);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { display: flex; align-items: center; text-decoration: none; color: inherit; }
        .logo-text { font-weight: bold; font-size: 1.1rem; letter-spacing: -0.5px; }
        .logo-text span { color: var(--accent-color); margin-left: 8px; font-weight: 500; }

        .menu a { margin: 0 15px; text-decoration: none; color: var(--text-main); font-size: 0.95rem; }

        /* Main Content */
        .content-container {
            max-width: 1000px;
            margin: 40px auto;
            background: var(--white);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .page-header h1 { font-size: 1.8rem; margin: 0 0 10px 0; }
        .page-header p { color: var(--text-sub); margin-bottom: 30px; }

        /* Search Bar */
        .filter-bar {
            background: #f4f5f7;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .search-form {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group { display: flex; align-items: center; gap: 10px; flex-grow: 1; }
        .input-group label { font-weight: 500; font-size: 0.9rem; width: 80px; }

        input[type="text"], select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 0.9rem;
        }

        .btn-search {
            background: #333;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-search:hover { background: #000; }

        /* Table Area */
        .result-info { margin-bottom: 15px; font-size: 0.9rem; color: var(--text-sub); }
        #countText { color: var(--accent-color); font-weight: bold; }

        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-sub);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .history-table td {
            padding: 20px 15px;
            border-bottom: 1px solid #f2f2f2;
            font-size: 0.95rem;
        }

        /* Status Styles */
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-success { background: #e8f5e9; color: #2e7d32; }
        .status-fail { background: #ffebee; color: #c62828; }

        .date-cell { color: var(--text-sub); font-size: 0.85rem; }
        .id-cell { color: #aaa; font-family: monospace; }

        /* Loading Spinner */
        .loading-trigger {
            text-align: center;
            padding: 20px;
            color: var(--text-sub);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <span class="logo-text">DAILYPICK <span>메일 이력</span></span>
            </a>
            <nav class="menu">
                <a href="#">뉴스</a>
                <a href="#">구독관리</a>
                <a href="#">알림설정</a>
            </nav>
        </div>
    </header>

    <main class="content-container">
        <section class="page-header">
            <h1>메일 발송 이력 조회</h1>
            <p>수신자 이메일과 발송 상태를 통해 내역을 필터링할 수 있습니다.</p>
        </section>

        <section class="filter-bar">
            <form id="mailLogForm" class="search-form">
                <div class="input-group">
                    <label>수신자 메일</label>
                    <input type="text" name="email" placeholder="example@gmail.com" style="flex-grow: 1;">
                </div>
                <div class="input-group">
                    <label>발송 상태</label>
                    <select name="isSuccess" id="statusSelect">
                        <option value="ALL">전체 상태</option>
                        <option value="Y">발송 성공</option>
                        <option value="N">발송 실패</option>
                    </select>
                </div>
                <button type="button" class="btn-search" id="searchBtn">이력 조회하기</button>
            </form>
        </section>

        <div class="result-info">
            조회 결과 <span id="countText">0</span>건
        </div>

        <table class="history-table">
            <thead>
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>수신 이메일</th>
                    <th style="width: 120px;">발송 상태</th>
                    <th style="width: 200px;">발송 일시</th>
                </tr>
            </thead>
            <tbody id="mailLogBody">
                <tr>
                    <td colspan="4" style="text-align: center; color: #999;">이력을 조회해 주세요.</td>
                </tr>
            </tbody>
        </table>

        <div id="loadingTrigger" class="loading-trigger">
            </div>
    </main>

    <script>
        let currentPage = 0;
        let pageSize = 10;
        let isLoading = false;
        let isLast = false;
        let totalCount = 0;

        async function getMailLogs(reset = false) {
            // 로딩 중이거나 이미 마지막 페이지면 중단
            if (isLoading || (isLast && !reset)) return;
            
            isLoading = true;
            const form = document.getElementById('mailLogForm');
            const formData = new FormData(form);
            const tbody = document.getElementById('mailLogBody');
            const loadingTrigger = document.getElementById('loadingTrigger');

            if (reset) {
                currentPage = 0;
                isLast = false;
                totalCount = 0;
                tbody.innerHTML = '';
                document.getElementById('countText').innerText = 0;
            }

            loadingTrigger.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 데이터를 불러오는 중...';

            formData.set("page", currentPage);
            formData.set("size", pageSize);

            const params = new URLSearchParams(formData.entries());

            try {
                const response = await fetch('/api/log/list', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: params.toString()
                });

                const data = await response.json();
                const list = data.send_log_list;

                if (!Array.isArray(list) || list.length === 0) {
                    if (currentPage === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 40px;">발송 이력이 없습니다.</td></tr>';
                    }
                    isLast = true;
                    loadingTrigger.innerHTML = '모든 내역을 불러왔습니다.';
                    return;
                }

                if (currentPage === 0) tbody.innerHTML = '';

                list.forEach(item => {
                    const statusClass = item.isSuccess === "Y" ? 'status-success' : 'status-fail';
                    const statusText = item.isSuccess === "Y" ? '성공' : '실패';

                    const row = `
                        <tr>
                            <td class="id-cell">${item.id || '-'}</td>
                            <td style="font-weight: 500;">${item.email || '-'}</td>
                            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                            <td class="date-cell">${item.deliveryDate || '-'}</td>
                        </tr>`;
                    tbody.insertAdjacentHTML('beforeend', row);
                });

                totalCount += list.length;
                document.getElementById('countText').innerText = totalCount;

                if (list.length < pageSize) {
                    isLast = true;
                    loadingTrigger.innerHTML = '마지막 페이지입니다.';
                } else {
                    loadingTrigger.innerHTML = '';
                }

                currentPage++;

            } catch (error) {
                console.error("메일 이력 조회 에러:", error);
                loadingTrigger.innerHTML = '데이터를 불러오는 중 오류가 발생했습니다.';
            } finally {
                isLoading = false;
            }
        }

        // 검색 버튼 클릭 이벤트
        document.getElementById('searchBtn').addEventListener('click', () => {
            getMailLogs(true);
        });

        // 무한 스크롤 로직
        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100) {
                getMailLogs();
            }
        });
    </script>
</body>
</html>
