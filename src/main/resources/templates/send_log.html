<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyPick - 메일 이력</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/send_log.css}">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <a th:href="@{/log/list}" class="logo">
                <span class="logo-text">DAILYPICK <span>메일 이력</span></span>
            </a>
            <nav class="menu">
                <a th:href="@{/summary/list}">뉴스</a>
                <a href="#">구독관리</a>
                <a th:href="@{/user/info}">마이페이지</a>
            </nav>
        </div>
    </header>
    <main class="content-container">
        <section class="page-header">
            <h1>메일 발송 이력 조회</h1>
            <p>수신자 이메일과 발송 상태를 통해 내역을 필터링할 수 있습니다.</p>
        </section>

        <section class="filter-bar">
            <form id="mailLogForm" class="search-form">
                <div class="input-group">
                    <label>발송 상태</label>
                    <select name="isSuccess" id="statusSelect">
                        <option value="ALL">전체 상태</option>
                        <option value="Y">발송 성공</option>
                        <option value="N">발송 실패</option>
                    </select>
                </div>
                <button type="button" class="btn-search" id="searchBtn">이력 조회하기</button>
            </form>
        </section>

        <div class="result-info">
            조회 결과 <span id="countText">0</span>건
        </div>

        <table class="history-table">
            <thead>
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>수신 이메일</th>
                    <th>뉴스 내용</th>
                    <th style="width: 120px;">발송 상태</th>
                    <th style="width: 200px;">발송 일시</th>
                </tr>
            </thead>
            <tbody id="mailLogBody">
                <tr th:each="log : ${send_log_list}">
                    <td class="id-cell" th:text="${log.id ?: '-'}"></td>
                    <td style="font-weight: 500;" th:text="${log.email ?: '-'}"></td>
                    <td class="content-cell" th:text="${log.newsContent ?: '-'}"></td>
                    <td>
                        <span class="status-badge" 
                            th:classappend="${log.isSuccess == 'Y' ? 'status-success' : 'status-fail'}" 
                            th:text="${log.isSuccess == 'Y' ? '성공' : '실패'}">
                        </span>
                    </td>
                    <td class="date-cell" th:text="${log.deliveryDate ?: '-'}"></td>
                    <td>
                        <a th:href="@{/log/detail(logId=${log.id})}" class="btn-detail">보기</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <div id="loadingTrigger" class="loading-trigger">
            </div>
    </main>

    <script>
        let currentPage = 1;
        const size = 10;
        let isLastPage = false;
        let isLoading = false;

        const logBody = document.getElementById('mailLogBody');
        const statusSelect = document.getElementById('statusSelect');
        const searchBtn = document.getElementById('searchBtn');
        const loadingTrigger = document.getElementById('loadingTrigger');

        function renderLogs(logs, isAppend = true) {
            if (!isAppend) logBody.innerHTML = '';
            
            logs.forEach(log => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="id-cell">${log.id || '-'}</td>
                    <td style="font-weight: 500;">${log.email || '-'}</td>
                    <td class="content-cell">${log.newsContent || '-'}</td>
                    <td>
                        <span class="status-badge ${log.isSuccess === 'Y' ? 'status-success' : 'status-fail'}">
                            ${log.isSuccess === 'Y' ? '성공' : '실패'}
                        </span>
                    </td>
                    <td class="date-cell">${log.deliveryDate || '-'}</td>
                `;
                logBody.appendChild(tr);
            });
            
            document.getElementById('countText').innerText = logBody.children.length;
        }

        async function fetchLogs(page) {
            if (isLoading || isLastPage) return;
            isLoading = true;

            const isSuccess = statusSelect.value;
            const response = await fetch(`/log/api/list?isSuccess=${isSuccess}&page=${page}&size=${size}`);
            const data = await response.json();

            if (data.length < size) isLastPage = true;
            
            renderLogs(data, true);
            isLoading = false;
        }

        searchBtn.addEventListener('click', async () => {
            currentPage = 0;
            isLastPage = false;
            
            const isSuccess = statusSelect.value;
            const response = await fetch(`/log/api/list?isSuccess=${isSuccess}&page=${currentPage}&size=${size}`);
            const data = await response.json();
            
            renderLogs(data, false);
            currentPage++;
        });

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading && !isLastPage) {
                fetchLogs(currentPage);
                currentPage++;
            }
        }, { threshold: 1.0 });

        observer.observe(loadingTrigger);
    </script>
</body>
</html>
