<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyPick - 뉴스</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/news_summary.css}">
</head>
<body>

    <header class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <strong>DAILYPICK</strong>
            </div>
            <nav class="menu">
                <a href="#">뉴스</a>
                <a href="#">구독관리</a>
                <a href="#">알림설정</a>
            </nav>
            <div class="icons">🔍 ☰</div>
        </div>
    </header>

    <main class="container">
        <section class="page-header">
            <h1>뉴스</h1>
            <p>세상에서 가장 쉬운 경제 뉴스</p>
            
            <div class="search-container">
                <form id="combinedForm" class="search-form">
                    <div class="input-group">
                        <label>카테고리</label>
                        <select name="categoryId" id="categorySelect">
                            <option value="0">전체보기</option>
                            <option th:each="category : ${category_list}" th:value="${category.id}" th:text="${category.categoryName}">
                                카테고리명
                            </option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>제목</label>
                        <input type="text" name="title" placeholder="검색어 입력">
                    </div>
                    <div class="input-group">
                        <label>내용</label>
                        <input type="text" name="content" placeholder="내용 검색">
                    </div>
                    <button type="button" class="btn-search" onclick="getNewsList()">조회하기</button>
                </form>
            </div>
        </section>

        <h3>전체 뉴스</h3>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <section class="news-grid" id="newsBody">
            <div class="empty-msg">데이터를 불러오는 중입니다...</div>
        </section>
    </main>

    <script>
        let currentPage = 0;      
        let isLastPage = false;  
        let isLoading = false;

        function getNewsList() {
            currentPage = 0;     
            isLastPage = false;
            isLoading = false;
            
            const newsBody = document.getElementById('newsBody');
            newsBody.innerHTML = '';
            
            fetchNews();
        }

        async function fetchNews() {
            if (isLoading || isLastPage) return;
            isLoading = true;

            const form = document.getElementById('combinedForm');
            const formData = new FormData(form);
            const params = new URLSearchParams(formData);
            
            params.append('page', currentPage);
            params.append('size', 10);

            try {
                const response = await fetch(`/api/summary/list`, {
                    method: 'POST', 
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: params.toString() 
                });

                const data = await response.json();

                if (data.status === "success") {
                    const list = data.summary_list;
                    document.getElementById('countText').textContent = data.total_count || 0;

                    if (list && list.length > 0) {
                        renderNews(list);
                        currentPage++;
                    } else {
                        if (currentPage === 0) {
                            document.getElementById('newsBody').innerHTML = '<div class="empty-msg">검색 결과가 없습니다.</div>';
                        }
                        isLastPage = true;
                    }
                }
            } catch (error) {
                console.error("데이터 로드 실패:", error);
            } finally {
                isLoading = false;
            }
        }

        function renderNews(list) {
            const newsBody = document.getElementById('newsBody');
            let html = ""; 
            
            list.forEach(news => {
                html += `
                    <article class="news-card">
                        <div class="card-img" style="background-image: url('https://via.placeholder.com/400x250?text=DailyPick')"></div>
                        <div class="card-body">
                            <span class="cat-tag">${news.categoryName || '일반'}</span>
                            <h3 class="card-title">${news.title || '제목 없음'}</h3>
                            <p class="card-date">${news.createDate || ''}</p> 
                            <p class="card-desc">${news.content || '내용이 없습니다.'}</p>
                        </div>
                    </article>
                `;
            });
            newsBody.insertAdjacentHTML('beforeend', html);
        }

        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
                fetchNews();
            }
        });

        document.addEventListener("DOMContentLoaded", function() {
            getNewsList(); 
        });
    </script>
</body>
</html>
