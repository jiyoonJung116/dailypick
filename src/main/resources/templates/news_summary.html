<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyPick - 뉴스</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/news_summary.css}">
</head>
<body>

    <header class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <strong>DAILYPICK</strong>
            </div>
            <nav class="menu">
                <a href="#">뉴스</a>
                <a href="#">구독관리</a>
                <a href="#">알림설정</a>
            </nav>
            <div class="icons">🔍 ☰</div>
        </div>
    </header>

    <main class="container">
        <section class="page-header">
            <h1>뉴스</h1>
            <p>세상에서 가장 쉬운 경제 뉴스</p>
            
            <div class="search-container">
                <form id="combinedForm" class="search-form">
                    <div class="input-group">
                        <label>카테고리</label>
                        <select name="categoryId" id="categorySelect">
                            <option value="0">전체보기</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>제목</label>
                        <input type="text" name="title" placeholder="검색어 입력">
                    </div>
                    <div class="input-group">
                        <label>내용</label>
                        <input type="text" name="content" placeholder="내용 검색">
                    </div>
                    <button type="button" class="btn-search" onclick="getNewsList()">조회하기</button>
                </form>
            </div>
        </section>

        <h3>전체 뉴스 (<span id="countText">0</span>)</h3>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <section class="news-grid" id="newsBody">
            <div class="empty-msg">데이터를 조회해 주세요.</div>
        </section>
    </main>

    <script>
        window.onload = function() {
            loadCategoryList();
            getNewsList(); 
        };

        async function loadCategoryList() {
            try {
                const response = await fetch('/api/category/list', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 'categoryName': '' }) 
                });
                const result = await response.json();

                if (result.status === "success") {
                    const select = document.getElementById('categorySelect');
                    result.category_list.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id; 
                        option.textContent = cat.categoryName;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error("카테고리 로드 실패:", error);
            }
        }

        async function getNewsList() {
            const form = document.getElementById('combinedForm');
            const formData = new FormData(form);
            const params = new URLSearchParams(formData);

            try {
                const response = await fetch('/api/summary/list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });

                const data = await response.json();
                const grid = document.getElementById('newsBody');
                grid.innerHTML = '';

                const list = data.category_list; 
                document.getElementById('countText').innerText = list?.length || 0;

                if (Array.isArray(list) && list.length > 0) {
                    list.forEach(item => {
                        const card = `
                            <article class="news-card">
                                <div class="card-img" style="background-image: url('https://via.placeholder.com/400x250?text=DailyPick')"></div>
                                <div class="card-body">
                                    <span class="cat-tag">${item.categoryName || '일반'}</span>
                                    <h3 class="card-title">${item.title || '제목 없음'}</h3>
                                    <p class="card-date">2026년 4월 16일 (목)</p> 
                                    <p class="card-desc">${item.content || '내용이 없습니다.'}</p>
                                </div>
                            </article>
                        `;
                        grid.innerHTML += card;
                    });
                } else {
                    grid.innerHTML = '<div class="empty-msg">검색 결과가 없습니다.</div>';
                }

            } catch (error) {
                console.error("뉴스 조회 에러:", error);
                alert("데이터를 가져오는 중 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
