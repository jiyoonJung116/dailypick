<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAILYPICK 회원페이지</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/info.css}">
</head>
<body>

<div class="container">
    <header>
        <div class="logo">
            <a th:href="@{/}" class="logo" style="text-decoration: none;">
                <span style="color:#7fb069">🦉</span> 
                <span class="logo-text" style="color: inherit; font-weight: bold;">DAILYPICK</span>
                <span style="font-weight: normal; margin-left: 5px; color: #333;">회원페이지</span>
            </a>
        </div>
        <nav>
            <a th:href="@{/summary/list}">뉴스</a>
            <a href="#">구독관리</a>
            <a th:href="@{/user/info}">마이페이지</a>
        </nav>
    </header>

    <section class="card">
        <div class="card-title"><i class="fas fa-user"></i> 회원 정보</div>
        <ul class="info-list">
            <li>이름 : <span id="info-name" th:text="${user_info.userName}"></span></li>
            <li>이메일 : <span id="info-email" th:text="${user_info.email}"></span></li>
            <li>가입일 : <span id="info-date" th:text="${user_info.createDate}"></span></li>
            <li>구독여부 : <span id="info-sub" th:text="${user_info.isSubscribe == 'T' ? 'O' : 'X'}"></span></li>
        </ul>
    </section>

    <section class="card" style="background: white; border: 1px solid #f0edf5;">
        <div class="card-title">
            <i class="fas fa-star"></i> 관심 뉴스 분야 설정 ⭐
        </div>
        <div class="interest-grid" id="category-container">
            <label th:each="category : ${category_list}">
                <input type="checkbox" name="categories" th:value="${category.id}" th:checked="${user_category_list.contains(category.id)}">
                <span th:text="${category.categoryName}"></span>
            </label>
        </div>
        <button class="btn-save" onclick="saveCategory()">저장하기</button>
    </section>

    <div class="bottom-row">
        <section class="card">
            <div class="card-title"><i class="fas fa-bell"></i> 알림 연동 설정</div>
            <div class="toggle-item">
                <span>📧 이메일 뉴스레터</span>
                <span class="status-badge" id="email-alarm-status"
                    th:text="${alarm_setting.isEmail == 'T' ? 'ON' : 'OFF'}"
                    th:style="'background:' + (${alarm_setting.isEmail == 'T' ? '#70d6b0' : '#ccc'})"
                    onclick="toggleAlarm('email')"> OFF
                </span>
            </div>
            <div class="toggle-item">
                <span>💬 카카오톡 알림</span>
                <span class="status-badge" id="kakao-alarm-status"
                    th:text="${alarm_setting.isKakao == 'T' ? 'ON' : 'OFF'}"
                    th:style="'background:' + (${alarm_setting.isKakao == 'T' ? '#70d6b0' : '#ccc'})"
                    onclick="toggleAlarm('kakao')"> OFF
                </span>
            </div>
        </section>

        <section class="card">
            <div class="card-title"><i class="fas fa-dollar-sign"></i> 구독 관리</div>
            <p style="margin: 0 0 15px 0;">현재 플랜 : <strong>Premium</strong></p>
            <label class="checkbox-group" style="margin-bottom: 10px;"><input type="checkbox" checked> 하루 뉴스 요약 제공</label>
            <label class="checkbox-group" style="margin-bottom: 10px;"><input type="checkbox" checked> 카카오톡 알림</label>
            <label class="checkbox-group"><input type="checkbox"> 광고 제거</label>
            
            <p style="margin-top: 20px; font-size: 14px; color: #666;">다음 결제일 : 2026.05.01</p>
            <div class="sub-btns">
                <button>플랜 변경</button>
                <button>결제 관리</button>
                <button>구독 해지</button>
            </div>
        </section>
    </div>
</div>

<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        fetch('/api/user/info', {
            method: 'POST',
            cache: 'no-cache'
        })
        .then(response => {
            if (!response.ok) throw response;
            return response.json();
        })
        .then(data => {
            if (data.status === "success") {
                const user = data.user_info;
                document.getElementById('info-name').textContent = user.userName || '이름 없음';
                document.getElementById('info-email').textContent = user.email || '-';
                document.getElementById('info-date').textContent = user.createDate || '-'; 
                document.getElementById('info-sub').textContent = (user.isSubscribe === 'T') ? 'O' : 'X';
                
                const planName = document.getElementById('plan-name');
                if(planName) {
                    planName.textContent = (user.isSubscribe === 'T') ? 'Premium' : '일반';
                }
            }
        })
        .catch(error => console.error("초기 데이터 로드 실패:", error));
    });

    function toggleAlarm(type) {
        const statusBadge = document.getElementById(type + '-alarm-status');
        const isCurrentOn = statusBadge.textContent.trim() === 'ON';
        
        const newStatus = isCurrentOn ? 'F' : 'T';
        const newText = isCurrentOn ? 'OFF' : 'ON';
        const newColor = isCurrentOn ? '#ccc' : '#70d6b0';

        updateAlarmStatus(type, newStatus).then(success => {
            if (success) {
                statusBadge.textContent = newText;
                statusBadge.style.background = newColor;
            } else {
                alert("설정 변경에 실패했습니다. 다시 시도해주세요.");
            }
        });
    }

    function updateAlarmStatus(type, newStatus) {
        const formData = new URLSearchParams();
        formData.append('type', type);
        formData.append('status', newStatus);

        return fetch('/api/alarm/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        })
        .then(response => {
            if (!response.ok) throw new Error('Network error');
            return response.json(); 
        })
        .then(data => data.status === 'success')
        .catch(error => {
            console.error('요청 실패:', error);
            return false;
        });
    }

    function saveCategory() {
        const checkedBoxes = document.querySelectorAll('input[name="categories"]:checked');
        const selectedIds = Array.from(checkedBoxes).map(box => box.value);

        if (selectedIds.length === 0) {
            alert("최소 하나 이상의 카테고리를 선택해주세요.");
            return;
        }

        const params = new URLSearchParams();
        selectedIds.forEach(id => params.append('categories', id));

        fetch('/api/category/insert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                alert("관심 분야가 성공적으로 저장되었습니다! ⭐");
            } else {
                alert("저장 실패: " + data.message);
            }
        })
        .catch(error => {
            console.error("저장 중 오류 발생:", error);
            alert("서버와 통신 중 오류가 발생했습니다.");
        });
    }
</script>

</body>
</html>
