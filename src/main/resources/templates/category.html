<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카테고리 선택</title>
</head>
<body>

<h4>관심 카테고리 선택</h4>

<form id="categoryForm">
    <div id="categoryContainer"></div>

    <button type="submit">저장</button>
</form>

<script>
    async function loadCategories() {
        try {
            const response = await fetch('/api/category/list', {
                method: 'POST',
                credentials: 'include'
            });

            const result = await response.json();

            if (result.status === 'success') {
                const categories = result.category_list;
                const container = document.getElementById('categoryContainer');

                container.innerHTML = '';

                if (!categories || categories.length === 0) {
                    container.innerHTML = '<p>카테고리가 없습니다.</p>';
                    return;
                }

                categories.forEach(category => {
                    console.log("category:", category);

                    const div = document.createElement('div');

                    div.innerHTML = `
                        <input type="checkbox"
                               name="categories"
                               value="${category.id}"
                               id="cat-${category.id}">
                        <label for="cat-${category.id}">
                            ${category.categoryName}
                        </label>
                    `;

                    container.appendChild(div);
                });

            } else {
                alert("카테고리 조회 실패: " + (result.message || ""));
            }

        } catch (error) {
            console.error("카테고리 로딩 에러:", error);
        }
    }

    async function sendCategoryData() {
        const form = document.getElementById('categoryForm');
        const formData = new FormData(form);

        try {
            const response = await fetch('/api/category/insert', {
                method: 'POST',
                body: new URLSearchParams(formData), // ⭐ 핵심
                credentials: 'include'
            });

            if (!response.ok) {
                throw new Error('네트워크 응답이 정상적이지 않습니다.');
            }

            const result = await response.json();
            console.log("저장 응답:", result);

            if (result.status === "success") {
                alert("저장 완료");
                window.location.href = '/';
            } else {
                alert("저장 실패: " + (result.message || ""));
            }

        } catch (error) {
            console.error("에러 발생:", error);
            alert("저장 중 오류 발생");
        }
    }

    document.getElementById('categoryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        sendCategoryData();
    });

    window.onload = loadCategories;
</script>

</body>
</html>
