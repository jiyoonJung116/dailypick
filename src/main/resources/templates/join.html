<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .signup-container { max-width: 400px; margin-top: 100px; }
    </style>
</head>
<body>

<div class="container signup-container">
    <div class="card shadow">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">회원가입</h3>
            
            <form th:action="@{/api/user/join}" method="post">
                
                <!-- 아이디 -->
                <div class="mb-3">
                    <label for="id" class="form-label">아이디</label>
                    <input type="text" class="form-control" id="id" name="userId" placeholder="아이디 입력" required>
                </div>

                <!-- 이름 -->
                <div class="mb-3">
                    <label for="name" class="form-label">이름</label>
                    <input type="text" class="form-control" id="name" name="userName" placeholder="이름 입력" required>
                </div>

                <!-- 이메일 -->
                <div class="mb-3">
                    <label for="email" class="form-label">이메일</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="example@mail.com" required>
                </div>

                <!-- 핸드폰 -->
                <div class="mb-3">
                    <label for="phone" class="form-label">핸드폰 번호</label>
                    <input type="text" class="form-control" id="phone" name="phoneNumber" placeholder="010-1234-5678" required>
                </div>

                <!-- 비밀번호 -->
                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호 입력" required>
                </div>

                <!-- 비밀번호 확인 -->
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">비밀번호 확인</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="비밀번호 재입력" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">가입하기</button>
            </form>
            
            <div class="mt-3 text-center">
                <small>이미 계정이 있으신가요? <a href="/login">로그인</a></small>
            </div>
        </div>
    </div>
</div>

</body>
</html>
