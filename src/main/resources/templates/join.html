<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyPick - 회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7fa;
            --white: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --accent-color: #6a5acd; /* DailyPick 시그니처 보라색 */
            --input-focus: #eeebff;
            --border-color: #e1e4e8;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .signup-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area h2 {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }

        .logo-area h2 span {
            color: var(--accent-color);
        }

        .signup-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .signup-card h3 {
            margin: 0 0 10px 0;
            font-size: 1.25rem;
            text-align: center;
        }

        .signup-card p {
            color: var(--text-sub);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px 12px 42px; /* 아이콘 공간 확보 */
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: var(--input-focus);
        }

        .form-control::placeholder {
            color: #ccc;
        }

        /* Button */
        .btn-join {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .btn-join:hover {
            opacity: 0.9;
        }

        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .footer-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="signup-wrapper">
    <div class="logo-area">
        <h2>DAILY<span>PICK</span></h2>
    </div>

    <div class="signup-card">
        <h3>회원가입</h3>
        <p>서비스 이용을 위해 정보를 입력해주세요.</p>

        <form th:action="@{/api/user/join}" method="post" id="joinForm">
            <div class="form-group">
                <label for="id">아이디</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-control" id="id" name="userId" placeholder="아이디를 입력하세요" required>
                </div>
            </div>

            <div class="form-group">
                <label for="name">이름</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-card"></i>
                    <input type="text" class="form-control" id="name" name="userName" placeholder="성함을 입력하세요" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">이메일</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" class="form-control" id="email" name="email" placeholder="example@mail.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="phone">핸드폰 번호</label>
                <div class="input-wrapper">
                    <i class="fas fa-mobile-alt"></i>
                    <input type="text" class="form-control" id="phone" name="phoneNumber" placeholder="010-1234-5678" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호 입력" required>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">비밀번호 확인</label>
                <div class="input-wrapper">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="비밀번호 재입력" required>
                </div>
            </div>

            <button type="submit" class="btn-join">가입하기</button>
        </form>
        
        <div class="footer-links">
            이미 계정이 있으신가요? <a href="/user/login">로그인</a>
        </div>
    </div>
</div>

<script>
    const joinForm = document.getElementById('joinForm');

    joinForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const pw = document.getElementById('password').value;
        const confirmPw = document.getElementById('confirmPassword').value;
        if (pw !== confirmPw) {
            alert('비밀번호가 일치하지 않습니다.');
            return;
        }

        const formData = new FormData(this);

        try {
            const response = await fetch(this.action, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.status === "success") {
                alert("회원가입이 완료되었습니다.");
                window.location.href = "/user/login"; 
            } else {
                alert("오류: " + result.message);
            }
        } catch (error) {
            console.error("회원가입 요청 에러:", error);
            alert("서버와 통신 중 문제가 발생했습니다.");
        }
    });

    document.getElementById('joinForm').onsubmit = function(e) {
        const pw = document.getElementById('password').value;
        const confirmPw = document.getElementById('confirmPassword').value;
        
        if (pw !== confirmPw) {
            alert('비밀번호가 일치하지 않습니다.');
            e.preventDefault();
        }
    };
</script>

</body>
</html>
