<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyPick - 회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/join.css}">
</head>
<body>

<div class="signup-wrapper">
    <div class="logo-area">
        <h2>DAILY<span>PICK</span></h2>
    </div>

    <div class="signup-card">
        <h3>회원가입</h3>
        <p>서비스 이용을 위해 정보를 입력해주세요.</p>

        <form th:action="@{/api/user/join}" method="post" id="joinForm">
            <div class="form-group">
                <label for="id">아이디</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-control" id="id" name="userId" placeholder="아이디를 입력하세요" required>
                </div>
            </div>

            <div class="form-group">
                <label for="name">이름</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-card"></i>
                    <input type="text" class="form-control" id="name" name="userName" placeholder="성함을 입력하세요" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">이메일</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" class="form-control" id="email" name="email" placeholder="example@mail.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="phone">핸드폰 번호</label>
                <div class="input-wrapper">
                    <i class="fas fa-mobile-alt"></i>
                    <input type="text" class="form-control" id="phone" name="phoneNumber" placeholder="010-1234-5678" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호 입력" required>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">비밀번호 확인</label>
                <div class="input-wrapper">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="비밀번호 재입력" required>
                </div>
            </div>

            <button type="submit" class="btn-join">가입하기</button>
        </form>
        
        <div class="footer-links">
            이미 계정이 있으신가요? <a href="/user/login">로그인</a>
        </div>
    </div>
</div>

<script>
    const joinForm = document.getElementById('joinForm');

    joinForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const pw = document.getElementById('password').value;
        const confirmPw = document.getElementById('confirmPassword').value;
        if (pw !== confirmPw) {
            alert('비밀번호가 일치하지 않습니다.');
            return;
        }

        const formData = new FormData(this);

        try {
            const response = await fetch(this.action, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.status === "success") {
                alert("회원가입이 완료되었습니다.");
                window.location.href = "/user/login"; 
            } else {
                alert("오류: " + result.message);
            }
        } catch (error) {
            console.error("회원가입 요청 에러:", error);
            alert("서버와 통신 중 문제가 발생했습니다.");
        }
    });

    document.getElementById('joinForm').onsubmit = function(e) {
        const pw = document.getElementById('password').value;
        const confirmPw = document.getElementById('confirmPassword').value;
        
        if (pw !== confirmPw) {
            alert('비밀번호가 일치하지 않습니다.');
            e.preventDefault();
        }
    };
</script>

</body>
</html>
